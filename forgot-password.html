<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — NeuralFlow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>

<body>

    <div class="fp-card">
        <a href="index.html" class="fp-logo">NeuralFlow</a>

        <!-- FORM STATE -->
        <div id="formState">
            <div class="fp-icon">🔑</div>
            <h2>Forgot your password?</h2>
            <p class="fp-sub">No worries! Enter your email address and we'll send you a reset link.</p>

            <div class="form-group">
                <label for="resetEmail">Email address</label>
                <input type="email" id="resetEmail" placeholder="you@company.com">
            </div>

            <button class="submit-btn" id="resetBtn" onclick="handleReset()">Send reset link →</button>
            <a href="login.html" class="back-link">← Back to sign in</a>
        </div>

        <!-- SUCCESS STATE -->
        <div class="success-state" id="successState">
            <div class="success-icon">📬</div>
            <h2>Check your inbox!</h2>
            <p>We've sent a password reset link to <strong id="sentEmail" style="color:#fff;"></strong>. Check your
                inbox and follow the instructions.</p>
            <a href="login.html" class="submit-btn" style="display:block;text-align:center;text-decoration:none;">Back
                to sign in</a>
            <p class="resend-note">Didn't receive it? <a onclick="resend()">Resend email</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function handleReset() {
            const emailInput = document.getElementById('resetEmail');
            const btn = document.getElementById('resetBtn');
            clearError(emailInput);

            if (!Validate.required(emailInput.value)) { showError(emailInput, 'Email is required.'); return; }
            if (!Validate.email(emailInput.value)) { showError(emailInput, 'Please enter a valid email address.'); return; }

            btn.textContent = 'Sending...';
            btn.disabled = true;

            // Simulate sending (fake — no real backend)
            setTimeout(() => {
                document.getElementById('sentEmail').textContent = emailInput.value;
                document.getElementById('formState').style.display = 'none';
                document.getElementById('successState').style.display = 'block';
            }, 1200);
        }

        function resend() {
            showToast('Reset link resent!', 'success');
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
    </script>
</body>

</html>
